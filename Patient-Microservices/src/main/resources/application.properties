spring.application.name=PATIENT-MICROSERVICES
hospital.name=Lady Irwin Hospital

server.port=8082

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka


eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

eureka.instance.health-check-url=http://localhost:8082/actuator/health
eureka.instance.status-page-url=http://localhost:8082/actuator/info
eureka.instance.home-page-url=http://localhost:8082/




